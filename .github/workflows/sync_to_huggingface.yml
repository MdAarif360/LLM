name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main] # Adjust this if your default branch is 'master'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE }}
        run: | 
          git push --force https://sandyrana545:$HF_TOKEN@huggingface.co/spaces/sandyrana545/OCR main
